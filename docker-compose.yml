services:
  postgres:
    image: postgres:16-alpine
    container_name: rsws-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rsws}
      POSTGRES_USER: ${POSTGRES_USER:-rsws}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rsws_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rsws}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rsws-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-rsws_redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-rsws_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rsws:
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    image: rsws-server:latest
    container_name: rsws-server
    ports:
      - "${SERVER_PORT:-5170}:5170"
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    environment:
      RSWS_DATABASE_URL: postgresql://${POSTGRES_USER:-rsws}:${POSTGRES_PASSWORD:-rsws_secret}@postgres:5432/${POSTGRES_DB:-rsws}
      RSWS_REDIS_URL: redis://:${REDIS_PASSWORD:-rsws_redis}@redis:6379
      RSWS_SERVER_HOST: "0.0.0.0"
      RSWS_SERVER_PORT: "5170"
      RUST_LOG: "${LOG_LEVEL:-info}"
      APP_SECRET: "${APP_SECRET:-rsws_dev_secret_change_in_production}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5170/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rsws-nginx
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-4000}:3000"
      - "${USER_PORT:-4002}:3001"
    depends_on:
      rsws:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ && curl -sf http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  uploads_data:
