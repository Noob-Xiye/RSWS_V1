name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rsws_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y postgresql-client redis-tools

      - name: Wait for services
        run: |
          until pg_isready -h localhost -p 5432; do sleep 1; done
          until redis-cli -h localhost ping | grep -q PONG; do sleep 1; done

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy linting
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Compile
        run: cargo build --all

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rsws_test
          REDIS_URL: redis://localhost:6379
          RUST_LOG: info
        run: cargo test --all

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Run cargo-audit
        run: |
          cargo install cargo-audit || true
          cargo audit || echo "audit completed"
