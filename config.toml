# 基础服务器配置（静态配置，启动时加载）
[server]
host = "127.0.0.1"
port = 8080
cors_origins = ["*"]

# 数据库配置（静态配置，启动时加载）
[database]
url = "postgresql://postgres:6inRdRcKG6b3BZp6@localhost:5432/epusdt_rust"
